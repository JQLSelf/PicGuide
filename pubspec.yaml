name: pixelvault
description: 图片视频浏览器 - 支持标签归档、EXIF筛选、仪表盘
version: 1.0.1+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 数据库 - drift (跨平台 SQLite ORM)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24   # Windows/Linux 自动打包 sqlite3.so/dll
  path: ^1.9.0

  # EXIF 读取
  native_exif: ^0.5.0

  # 文件操作
  file_picker: ^8.0.7

  # 图片渲染
  extended_image: ^8.3.0
  image: ^4.2.0                 # 图片压缩
  photo_view: ^0.14.0           # 图片全屏查看（缩放/平移）
  video_thumbnail: ^0.5.3
  video_player: ^2.8.6              # 视频播放

  # UI
  google_fonts: ^6.2.1
  flutter_staggered_grid_view: ^0.7.0
  # 右键菜单：原生实现，不依赖第三方包
  fl_chart: ^0.68.0              # 仪表盘图表

  # 地理编码 (GPS → 城市)
  geocoding: ^3.0.0

  # 实用工具
  rxdart: ^0.28.0
  crypto: ^3.0.3                  # MD5 计算

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # 代码生成
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/data/china_regions.json
    - assets/USER_MANUAL.md